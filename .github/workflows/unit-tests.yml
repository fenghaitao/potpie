name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Run unit tests (Python ${{ matrix.python-version }})
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    # Put these env vars at job scope so every step gets them
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      # uv defaults to ~/.cache/uv on Linux — a persistent runner-local path
      # that survives between runs without going through actions/cache.
      # Force copy to avoid hardlink issues across NFS/FS boundaries:
      UV_LINK_MODE: copy

    steps:
      - name: Stop backend before clean checkout
        # actions/checkout --clean deletes workspace files.  If gunicorn or celery
        # from a previous CI run are still running with open file handles inside
        # the workspace, NFS creates ".nfs*" silly-rename placeholder files that
        # can't be removed while the processes are alive, causing checkout to fail.
        # Stop the backend here (before the workspace is wiped) to release handles.
        run: |
          # Graceful stop via stop.sh if present from a previous checkout.
          if [ -f singularity/stop.sh ]; then
            bash singularity/stop.sh --force 2>/dev/null || true
          fi
          # Fallback: kill any gunicorn/celery with open handles in this workspace.
          pkill -f "${GITHUB_WORKSPACE}/.venv/bin/gunicorn" 2>/dev/null || true
          pkill -f "${GITHUB_WORKSPACE}/.venv/bin/celery"   2>/dev/null || true
          # Remove the singularity-compose venv that survives inside the submodule
          # directory: git clean -ffdx does not recurse into submodule dirs, so the
          # stale .venv would persist across checkouts and cause up.sh to try (and
          # fail) to install from an empty submodule directory.
          rm -rf singularity/singularity-compose/.venv
          # Allow OS/NFS to release file handles before checkout wipes the directory.
          sleep 3

      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Cache pip dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: .venv
      #     key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
      #     restore-keys: |
      #       venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Checkout submodules
        run: |
          git submodule update --init --recursive

      - name: Prepare Python & venv (install dev extra -> pytest)
        run: |
          set -euo pipefail
          uv python install "${UV_PYTHON}"

          # Create venv only if it was not restored
          test -d .venv || uv venv --python "${UV_PYTHON}" .venv
          # Sync base deps + dev tools from [dependency-groups]
          uv sync --group dev
          # Sanity check
          uv run python -V
          uv run pytest --version

          cp .env.template .env


      - name: Run unit tests
        # Run only the unit-tests/ folder.
        # -m "not integration" ensures tests marked @pytest.mark.integration are skipped
        # (those require live Copilot CLI / DB / Redis credentials).
        run: |
          mkdir -p test-results
          uv run pytest unit-tests/ \
            -m "not integration" \
            -v \
            --tb=short \
            --junitxml=test-results/junit.xml
        env:
          # Provide dummy values for any env-var that might be imported at
          # module-level but is NOT needed by the mocked unit tests.
          PYTHONDONTWRITEBYTECODE: "1"
          ENABLE_MULTI_AGENT: "false"

      - name: Run wiki-evaluator skill unit tests
        # Runs the skill's own test suite in isolation (no DB / Redis needed).
        # Uses --noconftest to skip the root conftest.py that requires live services.
        run: |
          uv run pytest tests/unit-tests/wiki-evaluator/ \
            -m "not integration" \
            -v \
            --tb=short \
            --noconftest \
            --junitxml=test-results/junit-wiki-evaluator.xml
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          ENABLE_MULTI_AGENT: "false"

      - name: Ensure backend services are healthy
        # Check Discovery Server, Postgres, Redis, Neo4j, and API.
        # If any service is down, call singularity/start.sh which is idempotent:
        #   - all healthy  → exits in seconds (reuses existing session)
        #   - some are down → restarts Singularity containers and re-registers
        #   - nothing running → full cold start
        run: |
          set -euo pipefail
          _port_open() { (echo >/dev/tcp/127.0.0.1/"$1") >/dev/null 2>&1; }

          SESSION_KEY="${USER}@$(hostname -s)"
          DISCO_FILE=".potpie-sessions/${SESSION_KEY}.discovery"
          DISCO_PORT=""; DISCO_PID=""; SESSION_INFO=""

          if [ -f "$DISCO_FILE" ]; then
            DISCO_PORT=$(python3 -c "import json; print(json.load(open('$DISCO_FILE'))['port'])" 2>/dev/null || true)
            DISCO_PID=$(python3  -c "import json; print(json.load(open('$DISCO_FILE'))['pid'])"  2>/dev/null || true)
          fi

          # Discovery Server alive only if its PID exists AND HTTP health responds.
          DISCO_OK=false
          if [ -n "$DISCO_PORT" ] && [ -n "$DISCO_PID" ] && kill -0 "$DISCO_PID" 2>/dev/null; then
            curl -sf "http://127.0.0.1:${DISCO_PORT}/health" >/dev/null 2>&1 && DISCO_OK=true
          fi

          if $DISCO_OK; then
            SESSION_INFO=$(curl -sf "http://127.0.0.1:${DISCO_PORT}/session/${SESSION_KEY}" 2>/dev/null || true)
          fi

          SERVICES_HEALTHY=false
          if [ -n "$SESSION_INFO" ]; then
            REDIS_PORT=$(python3 -c "import json,sys; print(json.loads(sys.argv[1])['ports']['redis'])"      "$SESSION_INFO" 2>/dev/null || true)
            PG_PORT=$(python3    -c "import json,sys; print(json.loads(sys.argv[1])['ports']['postgres'])"   "$SESSION_INFO" 2>/dev/null || true)
            BOLT_PORT=$(python3  -c "import json,sys; print(json.loads(sys.argv[1])['ports']['neo4j_bolt'])" "$SESSION_INFO" 2>/dev/null || true)
            API_PORT=$(python3   -c "import json,sys; print(json.loads(sys.argv[1])['ports']['api'])"        "$SESSION_INFO" 2>/dev/null || true)

            REDIS_OK=false; PG_OK=false; NEO4J_OK=false; API_OK=false
            _port_open "${REDIS_PORT}"  && REDIS_OK=true  || true
            _port_open "${PG_PORT}"     && PG_OK=true     || true
            _port_open "${BOLT_PORT}"   && NEO4J_OK=true  || true
            curl -sf "http://localhost:${API_PORT}/health" >/dev/null 2>&1 && API_OK=true || true

            echo "Service health check:"
            echo "  Discovery Server (pid ${DISCO_PID}, port ${DISCO_PORT}): OK"
            echo "  Postgres  port ${PG_PORT}     : ${PG_OK}"
            echo "  Redis     port ${REDIS_PORT}  : ${REDIS_OK}"
            echo "  Neo4j bolt port ${BOLT_PORT}  : ${NEO4J_OK}"
            echo "  API       port ${API_PORT}    : ${API_OK}"

            if $REDIS_OK && $PG_OK && $NEO4J_OK && $API_OK; then
              SERVICES_HEALTHY=true
            fi
          else
            echo "Discovery Server not reachable or no active session."
          fi

          if $SERVICES_HEALTHY; then
            echo "All backend services are healthy — skipping start."
          else
            echo "One or more services are unhealthy. Running singularity/start.sh ..."
            bash singularity/start.sh
          fi

      - name: Run integration tests
        # Ideally we should run all tests under integration tests folder,
        # currently only run the below test.
        #
        # The self-hosted runner has a persistent Potpie backend (started by the
        # preceding health-check step) whose dynamically allocated ports are tracked
        # by the Discovery Server.  Read those ports before running pytest so that
        # celery_app and alembic connect to the right endpoints.
        run: |
          # Export dynamic service ports from the active Discovery Server session.
          SESSION_KEY="${USER}@$(hostname -s)"
          DISCO_FILE=".potpie-sessions/${SESSION_KEY}.discovery"
          DISCO_PORT=$(python3 -c "import json; print(json.load(open('$DISCO_FILE'))['port'])" 2>/dev/null || true)
          if [ -n "$DISCO_PORT" ]; then
            SESSION_INFO=$(curl -sf "http://127.0.0.1:${DISCO_PORT}/session/${SESSION_KEY}" 2>/dev/null || true)
          fi
          if [ -n "$SESSION_INFO" ]; then
            export POSTGRES_SERVER=$(python3 -c "import json,sys; print(json.loads(sys.argv[1])['postgres_server'])" "$SESSION_INFO" 2>/dev/null || true)
            export REDIS_URL=$(python3       -c "import json,sys; print(json.loads(sys.argv[1])['redis_url'])"        "$SESSION_INFO" 2>/dev/null || true)
            export NEO4J_URI=$(python3       -c "import json,sys; print(json.loads(sys.argv[1])['neo4j_uri'])"        "$SESSION_INFO" 2>/dev/null || true)
            export API_PORT=$(python3        -c "import json,sys; print(json.loads(sys.argv[1])['ports']['api'])"     "$SESSION_INFO" 2>/dev/null || true)
            echo "Integration test ports — postgres: $(python3 -c "import json,sys; print(json.loads(sys.argv[1])['ports']['postgres'])" "$SESSION_INFO" 2>/dev/null), redis: $(python3 -c "import json,sys; print(json.loads(sys.argv[1])['ports']['redis'])" "$SESSION_INFO" 2>/dev/null), neo4j_bolt: $(python3 -c "import json,sys; print(json.loads(sys.argv[1])['ports']['neo4j_bolt'])" "$SESSION_INFO" 2>/dev/null), api: ${API_PORT}"
          else
            echo "ERROR: Could not retrieve session info from Discovery Server. Backend may not have started correctly."
            exit 1
          fi

          uv run pytest tests/integration-tests/test_dmlc_wiki.py \
            -v -s \
            --tb=short \
            --junitxml=test-results/junit-int.xml

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results-py${{ matrix.python-version }}
      #     path: test-results/junit.xml
      #     retention-days: 14
