name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Run unit tests (Python ${{ matrix.python-version }})
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    # Put these env vars at job scope so every step gets them
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      # uv defaults to ~/.cache/uv on Linux — a persistent runner-local path
      # that survives between runs without going through actions/cache.
      # Force copy to avoid hardlink issues across NFS/FS boundaries:
      UV_LINK_MODE: copy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Cache pip dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: .venv
      #     key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
      #     restore-keys: |
      #       venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Checkout submodules
        run: |
          git submodule update --init --recursive

      - name: Prepare Python & venv (install dev extra -> pytest)
        run: |
          set -euo pipefail
          uv python install "${UV_PYTHON}"

          # Create venv only if it was not restored
          test -d .venv || uv venv --python "${UV_PYTHON}" .venv
          # Sync base deps + dev tools from [dependency-groups]
          uv sync --group dev
          # Sanity check
          uv run python -V
          uv run pytest --version

          cp .env.template .env


      - name: Run unit tests
        # Run only the unit-tests/ folder.
        # -m "not integration" ensures tests marked @pytest.mark.integration are skipped
        # (those require live Copilot CLI / DB / Redis credentials).
        run: |
          mkdir -p test-results
          uv run pytest unit-tests/ \
            -m "not integration" \
            -v \
            --tb=short \
            --junitxml=test-results/junit.xml
        env:
          # Provide dummy values for any env-var that might be imported at
          # module-level but is NOT needed by the mocked unit tests.
          PYTHONDONTWRITEBYTECODE: "1"
          ENABLE_MULTI_AGENT: "false"

      - name: Run wiki-evaluator skill unit tests
        # Runs the skill's own test suite in isolation (no DB / Redis needed).
        # Uses --noconftest to skip the root conftest.py that requires live services.
        run: |
          uv run pytest tests/unit-tests/wiki-evaluator/ \
            -m "not integration" \
            -v \
            --tb=short \
            --noconftest \
            --junitxml=test-results/junit-wiki-evaluator.xml
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          ENABLE_MULTI_AGENT: "false"

      - name: Run integration tests
        # Ideally we should run all tests under integration tests folder,
        # currently only run the below test
        run: |
          uv run pytest tests/integration-tests/test_dmlc_wiki.py \
            -v -s \
            --tb=short \
            --junitxml=test-results/junit-int.xml

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results-py${{ matrix.python-version }}
      #     path: test-results/junit.xml
      #     retention-days: 14
