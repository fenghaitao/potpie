services:
  postgres:
    image: postgres:latest
    container_name: potpie_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: momentum
      # Use host machine IP for proxy and exclude local services from proxy
      HTTP_PROXY: "http://192.168.1.10:7890"
      HTTPS_PROXY: "http://192.168.1.10:7890"
      http_proxy: "http://192.168.1.10:7890"
      https_proxy: "http://192.168.1.10:7890"
      NO_PROXY: "localhost,127.0.0.1,postgres,neo4j,redis"
      no_proxy: "localhost,127.0.0.1,postgres,neo4j,redis"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY && pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:latest
    container_name: potpie_neo4j
    environment:
      NEO4J_AUTH: neo4j/mysecretpassword
      NEO4J_PLUGINS: '["apoc"]' # Install APOC plugin (Neo4j 5.0+ syntax)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*" # Allow APOC procedures
      NEO4J_dbms_memory_transaction_total_max: 0
      # Use host machine IP for proxy and exclude local services from proxy
      HTTP_PROXY: "http://192.168.1.10:7890"
      HTTPS_PROXY: "http://192.168.1.10:7890"
      http_proxy: "http://192.168.1.10:7890"
      https_proxy: "http://192.168.1.10:7890"
      NO_PROXY: "localhost,127.0.0.1,postgres,neo4j,redis"
      no_proxy: "localhost,127.0.0.1,postgres,neo4j,redis"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: potpie_redis_broker
    environment:
      # Use host machine IP for proxy and exclude local services from proxy
      HTTP_PROXY: "http://192.168.1.10:7890"
      HTTPS_PROXY: "http://192.168.1.10:7890"
      http_proxy: "http://192.168.1.10:7890"
      https_proxy: "http://192.168.1.10:7890"
      NO_PROXY: "localhost,127.0.0.1,postgres,neo4j,redis"
      no_proxy: "localhost,127.0.0.1,postgres,neo4j,redis"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  app-network:
    driver: bridge
